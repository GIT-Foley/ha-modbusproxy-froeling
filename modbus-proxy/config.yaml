name: "modbus-proxy-froeling"
description: "Proxy for Accessing modbus systems. Allows multiple client connections"
version: "1.0.19"
slug: "modbus_proxy_froeling"
arch:
  - aarch64
  - amd64
url: "https://community.home-assistant.io/t/updated-solaredge-modbus-full-setup-guide-with-energy-dashboard-integration-for-installations-with-battery-connected/340956/216?u=akulatraxas"
startup: services
init: false
options:
  upstreamhost: "192.168.50.200"
  upstreamport: 502
  listenport: 5021
  connection_time: 0.1
  timeout: 10
  loglevel: "INFO"
schema:
  upstreamhost: str
  upstreamport: int
  listenport: int
  connection_time: float
  timeout: int
  loglevel: list(INFO|DEBUG|ERROR)
ports:
  5021/tcp: 5021
